<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Procedural Map Painter (Web)</title>
<style>
  :root {
    --bg: #101010;
    --panel: #1b1b1b;
    --border: #333333;
    --select: #39c0ff;
    --text: #e8e8e8;
    --muted: #888888;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 14px;
  }
  body { display: flex; flex-direction: column; }
  .toolbar, .refstrip {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    padding: 6px 8px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .toolbar button {
    background: #2a2a2a;
    color: var(--text);
    border: 1px solid #444;
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .toolbar button:hover { background: #383838; }
  .toolbar .sep {
    width: 1px;
    align-self: stretch;
    background: var(--border);
    margin: 0 6px;
  }
  .refstrip { min-height: 40px; gap: 8px; }
  .ref {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
  }
  .ref img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border: 1px solid #444;
    border-radius: 3px;
  }
  .ref button {
    font-size: 10px;
    padding: 1px 6px;
    background: #2a2a2a;
    color: var(--text);
    border: 1px solid #444;
    border-radius: 3px;
    cursor: pointer;
  }
  .ref .name { color: var(--muted); max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .placeholder { color: var(--muted); }
  #stage {
    position: relative;
    flex: 1 1 auto;
    overflow: hidden;
    background: var(--bg);
    cursor: crosshair;
  }
  #canvas { position: absolute; top: 0; left: 0; }
  .status {
    padding: 4px 8px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
  }
  .swal-field { display: flex; flex-direction: column; text-align: left; margin: 6px 0; }
  .swal-field label { font-size: 12px; margin-bottom: 2px; color: #555; }
  .swal-row { display: flex; gap: 8px; }
  .swal-row .swal-field { flex: 1; }
</style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <button id="btn-generate">Generate</button>
    <button id="btn-clear">Clear selection</button>
    <button id="btn-erase">Erase tiles</button>
    <div class="sep"></div>
    <button id="btn-upload">Upload reference</button>
    <div class="sep"></div>
    <button id="btn-zoom-out">&minus;</button>
    <button id="btn-zoom-in">+</button>
    <button id="btn-fit">Fit</button>
    <div class="sep"></div>
    <button id="btn-export">Export PNG</button>
    <button id="btn-save">Save map</button>
    <button id="btn-load">Load map</button>
    <div class="sep"></div>
    <button id="btn-settings">API settings</button>
  </div>

  <div class="refstrip" id="refstrip">
    <span class="placeholder">No reference images. Use 'Upload reference'.</span>
  </div>

  <div id="stage">
    <canvas id="canvas"></canvas>
  </div>

  <div class="status" id="status">Loading&hellip;</div>

  <input id="file-ref" type="file" accept="image/*" multiple hidden />
  <input id="file-load" type="file" accept="application/json,.json" hidden />

<script type="module">
import Swal from 'https://cdn.jsdelivr.net/npm/sweetalert2@11/+esm';

/* ---------------------------------------------------------------- constants */
const START_ZOOM = 2;
const MIN_ZOOM = 0.02;
const MAX_ZOOM = 4.0;
/* On a fresh map we want the whole tile grid to be visible as small squares,
   anchored to the top-left corner. We pick a zoom so each cell shows at roughly
   this many on-screen pixels (e.g. a 1024px tile -> ~0.1 zoom). */
const INITIAL_CELL_PX = 100;

const STORAGE_KEY_CONFIG = 'mapgen.apiConfig';
const STORAGE_KEY_GENERATIONS = 'mapgen.generations';
const STORAGE_KEY_TILE_INDEX = 'mapgen.tileIndex';
const IDB_NAME = 'mapgen';
const IDB_STORE = 'tiles';
const GRID_COLOR = '#5a6678';      
const GRID_COLOR_MAJOR = '#8893a8';
const EMPTY_CELL = '#000000';
const EMPTY_CELL_ALT = '#0b0d12';   // checker so the grid reads even on empty maps
const SELECT_OUTLINE = '#39c0ff';
const SELECT_FILL = 'rgba(57,192,255,0.30)';
const GREEN = [0, 255, 0];         

/* Nano Banana 2 only emits square images whose side is a multiple of 1024.
   1x1 -> 1024, 2x2 -> 2048, up to 4x4 -> 4096. A selection's bounding box may
   therefore never exceed 4 cells on either side. */
const TIER_SIZES = [1, 2, 4];
const MAX_TIER = 4;
const TILE_PX = 1024;

const LEO_V2_GENERATIONS = 'https://cloud.leonardo.ai/api/rest/v2/generations';
const LEO_V1 = 'https://cloud.leonardo.ai/api/rest/v1';

const DEFAULT_MODEL = 'nano-banana-2';

/* --------------------------------------------------------------- utilities */
function roundTo(value, multiple = 16) {
  return Math.max(multiple, Math.round(value / multiple) * multiple);
}

/* Is the selected set 4-connected (orthogonally contiguous)? */
function isContiguous(cells) {
  if (cells.length <= 1) return true;
  const set = new Set(cells.map(([c, r]) => c + ',' + r));
  const seen = new Set();
  const [sc, sr] = cells[0];
  const stack = [[sc, sr]];
  seen.add(sc + ',' + sr);
  while (stack.length) {
    const [c, r] = stack.pop();
    for (const [dc, dr] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const k = (c + dc) + ',' + (r + dr);
      if (set.has(k) && !seen.has(k)) { seen.add(k); stack.push([c + dc, r + dr]); }
    }
  }
  return seen.size === set.size;
}

/* Validate a selection against the Nano-Banana tier rules. Returns
   { ok, reason, bounds, span } so callers can notify the user. */
function validateSelection(cells) {
  if (!cells.length) return { ok: false, reason: 'Select one or more tiles first.' };
  const bounds = MapModel.regionBounds(cells);
  const span = Math.max(bounds[2] - bounds[0] + 1, bounds[3] - bounds[1] + 1);
  if (span > MAX_TIER) {
    return { ok: false, bounds, span,
      reason: `Selection spans ${span} tiles on a side. Nano Banana 2 only renders ` +
              `up to ${MAX_TIER}x${MAX_TIER} (${MAX_TIER * TILE_PX}px) at once. ` +
              `Please select a smaller, connected area.` };
  }
  if (!isContiguous(cells)) {
    return { ok: false, bounds, span,
      reason: 'Selected tiles must be connected (touching edge to edge). ' +
              'Please select a single contiguous block.' };
  }
  return { ok: true, bounds, span };
}

function dataUrlToBlob(dataUrl) {
  const [head, b64] = dataUrl.split(',');
  const mime = (head.match(/data:([^;]+)/) || [, 'image/png'])[1];
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

/* ----------------------------------------------------- persistent storage */
function loadConfig() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_CONFIG);
    return raw ? JSON.parse(raw) : {};
  } catch (err) {
    console.warn('Could not read saved API settings:', err);
    return {};
  }
}

function saveConfig(config) {
  try {
    localStorage.setItem(STORAGE_KEY_CONFIG, JSON.stringify(config));
  } catch (err) {
    console.warn('Could not persist API settings:', err);
  }
}

function recordGeneration(record) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_GENERATIONS);
    const list = raw ? JSON.parse(raw) : [];
    list.push({ ...record, savedAt: new Date().toISOString() });
    localStorage.setItem(STORAGE_KEY_GENERATIONS, JSON.stringify(list.slice(-100)));
    console.log('Saved generation response to localStorage:', record);
  } catch (err) {
    console.warn('Could not persist generation response:', err);
  }
}

/* The x,y -> generationId index lives in localStorage so it survives reloads
   and is cheap to scan; the heavy image bytes live in IndexedDB keyed by the
   same "c,r" so we never re-download a tile we already have. */
function loadTileIndex() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY_TILE_INDEX);
    return raw ? JSON.parse(raw) : {};
  } catch (err) {
    console.warn('Could not read tile index:', err);
    return {};
  }
}

function saveTileIndex(index) {
  try {
    localStorage.setItem(STORAGE_KEY_TILE_INDEX, JSON.stringify(index));
  } catch (err) {
    console.warn('Could not persist tile index:', err);
  }
}

/* ---------------------------------------------------- IndexedDB image cache */
const ImageDB = {
  _db: null,
  async open() {
    if (this._db) return this._db;
    this._db = await new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this._db;
  },
  async _tx(mode) {
    const db = await this.open();
    return db.transaction(IDB_STORE, mode).objectStore(IDB_STORE);
  },
  async put(key, value) {
    const store = await this._tx('readwrite');
    return new Promise((resolve, reject) => {
      const req = store.put(value, key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  },
  async get(key) {
    const store = await this._tx('readonly');
    return new Promise((resolve, reject) => {
      const req = store.get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  },
  async delete(key) {
    const store = await this._tx('readwrite');
    return new Promise((resolve, reject) => {
      const req = store.delete(key);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  },
};

function newCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w;
  c.height = h;
  return c;
}

/* Rebuild a canvas of the given size from a PNG/JPEG data URL. Used when a
   stored history entry needs to become the active (rendered) tile again. */
function dataUrlToCanvas(dataUrl, w, h) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const cv = newCanvas(w, h);
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(cv);
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

/* ------------------------------------------------------------------- model */
class MapModel {
  constructor(cols, rows, cellW, cellH) {
    this.cols = cols | 0;
    this.rows = rows | 0;
    this.cellW = roundTo(cellW);
    this.cellH = roundTo(cellH);
    this.tiles = new Map(); 
    this.ids = new Map();   // "c,r" -> generationId that produced the active tile
    /* "c,r" -> array of generation results, newest/active first. Each entry is
       { id, prompt, savedAt, dataUrl, canvas? }. history[0] is the rendered
       tile; the user can browse/switch/delete entries from the right-click
       menu, which keeps this array and the tiles/ids caches in sync. */
    this.history = new Map();
  }
  key(c, r) { return c + ',' + r; }
  inBounds(c, r) { return c >= 0 && c < this.cols && r >= 0 && r < this.rows; }
  isEmpty(c, r) { return !this.tiles.has(this.key(c, r)); }
  getTile(c, r) { return this.tiles.get(this.key(c, r)) || null; }
  getId(c, r) { return this.ids.get(this.key(c, r)) || null; }
  getHistory(c, r) { return this.history.get(this.key(c, r)) || []; }
  setTile(c, r, canvas, generationId = null) {
    if (!this.inBounds(c, r)) return;
    this.tiles.set(this.key(c, r), canvas);
    if (generationId) this.ids.set(this.key(c, r), generationId);
  }
  clearTile(c, r) {
    const k = this.key(c, r);
    this.tiles.delete(k);
    this.ids.delete(k);
    this.history.delete(k);
  }

  /* Record a freshly generated result for a cell. The new result becomes the
     active (first) entry; previous results are kept so they can be restored. */
  recordResult(c, r, canvas, meta = {}) {
    if (!this.inBounds(c, r)) return;
    const k = this.key(c, r);
    const entry = {
      id: meta.id || null,
      prompt: meta.prompt || '',
      savedAt: new Date().toISOString(),
      dataUrl: canvas.toDataURL('image/png'),
      canvas,
    };
    const hist = this.history.get(k) || [];
    hist.unshift(entry);
    this.history.set(k, hist);
    this.tiles.set(k, canvas);
    if (entry.id) this.ids.set(k, entry.id); else this.ids.delete(k);
  }

  /* Make the entry at idx the active one (moves it to the front) and refresh
     the rendered tile from its stored image. */
  async setActiveIndex(c, r, idx) {
    const k = this.key(c, r);
    const hist = this.history.get(k) || [];
    if (idx <= 0 || idx >= hist.length) return;
    const [entry] = hist.splice(idx, 1);
    hist.unshift(entry);
    this.history.set(k, hist);
    await this.refreshActive(c, r);
  }

  /* Remove the entry at idx. Returns the number of remaining entries. */
  removeHistoryIndex(c, r, idx) {
    const k = this.key(c, r);
    const hist = this.history.get(k) || [];
    if (idx < 0 || idx >= hist.length) return hist.length;
    hist.splice(idx, 1);
    if (!hist.length) { this.clearTile(c, r); return 0; }
    this.history.set(k, hist);
    return hist.length;
  }

  /* Sync the tiles/ids caches to the current active (first) history entry,
     rebuilding its canvas from the stored data URL if needed. */
  async refreshActive(c, r) {
    const k = this.key(c, r);
    const hist = this.history.get(k) || [];
    if (!hist.length) { this.clearTile(c, r); return; }
    const e = hist[0];
    if (!e.canvas) e.canvas = await dataUrlToCanvas(e.dataUrl, this.cellW, this.cellH);
    if (e.canvas) this.tiles.set(k, e.canvas);
    if (e.id) this.ids.set(k, e.id); else this.ids.delete(k);
  }

  static regionBounds(cells) {
    let c0 = Infinity, r0 = Infinity, c1 = -Infinity, r1 = -Infinity;
    for (const [c, r] of cells) {
      c0 = Math.min(c0, c); r0 = Math.min(r0, r);
      c1 = Math.max(c1, c); r1 = Math.max(r1, r);
    }
    return [c0, r0, c1, r1];
  }
  regionPixelSize([c0, r0, c1, r1]) {
    return [(c1 - c0 + 1) * this.cellW, (r1 - r0 + 1) * this.cellH];
  }

  /* Given a selection bounding box, return the square (in cells) of the
     smallest Nano-Banana tier (1/2/4) that fully contains it, anchored so it
     stays inside the map. side = tier cells, px = tier * 1024. */
  squareTier(bounds) {
    const [c0, r0, c1, r1] = bounds;
    const need = Math.max(c1 - c0 + 1, r1 - r0 + 1);
    const tier = TIER_SIZES.find(t => t >= need);
    if (!tier) return null; // bigger than 4x4 -> caller must reject
    const side = tier;
    let sc0 = Math.min(c0, Math.max(0, this.cols - side));
    let sr0 = Math.min(r0, Math.max(0, this.rows - side));
    sc0 = Math.max(0, sc0);
    sr0 = Math.max(0, sr0);
    return { sc0, sr0, side, tier, px: tier * TILE_PX };
  }

  /* Build the square sent to the model: existing tiles as context, the fill
     (green) cells painted GREEN to be filled, every other empty cell BLACK.
     `fillSet` holds the cells we actually want regenerated; any selected cell
     that already has art is intentionally NOT in fillSet so it is drawn as
     locked image context and left untouched. */
  buildSquareContext(square, fillSet) {
    const { sc0, sr0, side } = square;
    const w = side * this.cellW, h = side * this.cellH;
    const canvas = newCanvas(w, h);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, w, h);
    for (let dr = 0; dr < side; dr++) {
      for (let dc = 0; dc < side; dc++) {
        const c = sc0 + dc, r = sr0 + dr;
        const x = dc * this.cellW, y = dr * this.cellH;
        const tile = this.getTile(c, r);
        if (tile && !fillSet.has(c + ',' + r)) {
          ctx.drawImage(tile, x, y);
        }
      }
    }
    ctx.fillStyle = `rgb(${GREEN[0]},${GREEN[1]},${GREEN[2]})`;
    for (let dr = 0; dr < side; dr++) {
      for (let dc = 0; dc < side; dc++) {
        const c = sc0 + dc, r = sr0 + dr;
        if (fillSet.has(c + ',' + r)) {
          ctx.fillRect(dc * this.cellW, dr * this.cellH, this.cellW, this.cellH);
        }
      }
    }
    return canvas;
  }

  regionHasContext(square, fillSet) {
    const { sc0, sr0, side } = square;
    for (let dr = 0; dr < side; dr++) {
      for (let dc = 0; dc < side; dc++) {
        const c = sc0 + dc, r = sr0 + dr;
        if (!this.isEmpty(c, r) && !fillSet.has(c + ',' + r)) return true;
      }
    }
    return false;
  }

  /* Crop each fill (green) cell out of the square result and store it. The
     result image is square.px on a side and represents square.side cells, so
     one cell occupies (px / side) px in the result. Only the green cells are
     written back, so locked context tiles in the square are never altered. */
  applySquareResult(image, square, fillCells, generationId, prompt) {
    const { sc0, sr0, side, px } = square;
    const cellPx = px / side;
    const changed = [];
    for (const [c, r] of fillCells) {
      if (!this.inBounds(c, r)) continue;
      const dc = c - sc0, dr = r - sr0;
      if (dc < 0 || dr < 0 || dc >= side || dr >= side) continue;
      const tile = newCanvas(this.cellW, this.cellH);
      tile.getContext('2d').drawImage(
        image,
        dc * cellPx, dr * cellPx, cellPx, cellPx,
        0, 0, this.cellW, this.cellH,
      );
      this.recordResult(c, r, tile, { id: generationId, prompt });
      changed.push([c, r]);
    }
    return changed;
  }

  renderFull(scale = 1.0) {
    const fullW = this.cols * this.cellW;
    const fullH = this.rows * this.cellH;
    const canvas = newCanvas(Math.max(1, Math.round(fullW * scale)),
                             Math.max(1, Math.round(fullH * scale)));
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(scale, scale);
    for (const [k, tile] of this.tiles) {
      const [c, r] = k.split(',').map(Number);
      ctx.drawImage(tile, c * this.cellW, r * this.cellH);
    }
    return canvas;
  }

  toJSON() {
    const tiles = [];
    for (const [k, tile] of this.tiles) {
      const [c, r] = k.split(',').map(Number);
      const hist = this.history.get(k) || [];
      tiles.push({
        c, r,
        data: tile.toDataURL('image/png'),
        id: this.ids.get(k) || null,
        history: hist.map(e => ({ id: e.id, prompt: e.prompt, savedAt: e.savedAt, data: e.dataUrl })),
      });
    }
    return { cols: this.cols, rows: this.rows, cellW: this.cellW, cellH: this.cellH, tiles };
  }
  static async fromJSON(meta) {
    const model = new MapModel(meta.cols, meta.rows, meta.cellW, meta.cellH);
    await Promise.all((meta.tiles || []).map(t => new Promise((resolve) => {
      if (!model.inBounds(t.c, t.r)) { resolve(); return; }
      const img = new Image();
      img.onload = () => {
        const tile = newCanvas(model.cellW, model.cellH);
        tile.getContext('2d').drawImage(img, 0, 0, model.cellW, model.cellH);
        model.setTile(t.c, t.r, tile, t.id || null);
        const histMeta = (t.history && t.history.length)
          ? t.history
          : [{ id: t.id || null, prompt: '', savedAt: null, data: t.data }];
        const entries = histMeta.map((e, i) => ({
          id: e.id || null, prompt: e.prompt || '', savedAt: e.savedAt || null,
          dataUrl: e.data, canvas: i === 0 ? tile : null,
        }));
        model.history.set(model.key(t.c, t.r), entries);
        resolve();
      };
      img.onerror = () => resolve();
      img.src = t.data;
    })));
    return model;
  }
}

/* -------------------------------------------------------- Leonardo backend */
class LeonardoGenerator {
  constructor(apiKey, model = DEFAULT_MODEL) {
    this.apiKey = apiKey;
    this.model = model || DEFAULT_MODEL;
  }

  get authHeaders() {
    return { authorization: 'Bearer ' + this.apiKey, accept: 'application/json' };
  }

  async uploadImage(blob, extension = 'png') {
    const presignResp = await fetch(`${LEO_V1}/init-image`, {
      method: 'POST',
      headers: { ...this.authHeaders, 'content-type': 'application/json' },
      body: JSON.stringify({ extension }),
    });
    if (!presignResp.ok) {
      throw new Error(await leoError(presignResp, 'requesting an upload URL'));
    }
    const out = (await presignResp.json())?.uploadInitImage || {};
    if (!out.url || !out.fields || !out.id) {
      throw new Error('Leonardo did not return upload details for the image.');
    }
    const fields = typeof out.fields === 'string' ? JSON.parse(out.fields) : out.fields;
    const form = new FormData();
    for (const [k, v] of Object.entries(fields)) form.append(k, v);
    form.append('file', blob, `region.${extension}`);
    // The presigned S3 (s3-accelerate) bucket does not return an
    // Access-Control-Allow-Origin header, so a normal cross-origin fetch is
    // blocked from *reading* the response even though the upload itself
    // succeeds (S3 replies 204). We don't need the response body or status:
    // the image id was already returned by /init-image above. Use no-cors so
    // the browser sends the POST and resolves with an opaque response instead
    // of throwing a CORS error.
    try {
      const s3Resp = await fetch(out.url, { method: 'POST', body: form, mode: 'no-cors' });
      // Opaque responses report type 'opaque' and status 0; a same-origin or
      // CORS-enabled response still lets us catch a genuine non-2xx failure.
      if (s3Resp.type !== 'opaque' && !s3Resp.ok && s3Resp.status !== 204) {
        throw new Error(`Image upload to storage failed (HTTP ${s3Resp.status}).`);
      }
    } catch (err) {
      throw new Error(`Image upload to storage failed: ${err.message}`);
    }
    return out.id; 
  }

  async generateRegion(model, selected, prompt, refImages) {
    const bounds = MapModel.regionBounds(selected);
    const square = model.squareTier(bounds);
    if (!square) {
      throw new Error(`Selection exceeds the ${MAX_TIER}x${MAX_TIER} tile limit.`);
    }
    /* Fill (green) targets = selected cells that are currently empty, so we
       outpaint into blank space and never repaint a neighbour's existing art.
       If every selected cell already has art, treat them all as targets (an
       explicit full regeneration / inpaint of those tiles). */
    const emptySelected = selected.filter(([c, r]) => model.isEmpty(c, r));
    const fillCells = emptySelected.length ? emptySelected : selected;
    const fillSet = new Set(fillCells.map(([c, r]) => c + ',' + r));
    const hasContext = model.regionHasContext(square, fillSet);
    const { px } = square;

    console.log('Generation plan:', {
      selectionBounds: bounds,
      square,
      requestSize: `${px}x${px}`,
      hasContext,
      selectedCells: selected,
      fillCells,
    });

    let text = prompt;
    const imageRefs = [];

    // Always send the square context so the model knows the green cells to fill
    // and the surrounding tiles to match.
    text += '\n\nThis is an image edit on a square canvas. Fill ONLY the solid ' +
      'green cells, painting a single seamless image that blends with the ' +
      'surrounding non-green tiles. Do not change any non-green pixels.';
    const contextCanvas = model.buildSquareContext(square, fillSet);
    const contextDataUrl = contextCanvas.toDataURL('image/png');
    console.log('Context square (data URL length):', contextDataUrl.length);
    const ctxId = await this.uploadImage(dataUrlToBlob(contextDataUrl));
    imageRefs.push({ image: { id: ctxId, type: 'UPLOADED' }, strength: 'HIGH' });

    for (const ref of (refImages || [])) {
      const id = await this.uploadImage(dataUrlToBlob(`data:${ref.mimeType};base64,${ref.data}`));
      imageRefs.push({ image: { id, type: 'UPLOADED' }, strength: 'MID' });
    }

    const parameters = {
      width: px,
      height: px,
      prompt: text,
      quantity: 1, 
      prompt_enhance: 'OFF',
    };
    if (imageRefs.length) {
        parameters.guidances = { image_reference: imageRefs.slice(0, 6) };
    }

    const payload = { model: this.model, parameters, public: false };
    console.log('Sending V2 Payload:', payload);

    const resp = await fetch(LEO_V2_GENERATIONS, {
      method: 'POST',
      headers: { ...this.authHeaders, 'content-type': 'application/json' },
      body: JSON.stringify(payload),
    });
    
    if (!resp.ok) throw new Error(await leoError(resp, 'starting the generation'));

    const job = await resp.json();
    console.log('Job Response (object):', job);

    const generationId = extractGenerationId(job);
    recordGeneration({ generationId, response: job, prompt: text, square });
    if (!generationId) {
      console.error('Could not parse a generation id from Leonardo response:', job);
      throw new Error('Leonardo did not return a generation id. Check console for raw response.');
    }
    console.log('Parsed generationId:', generationId);

    const url = await this.pollResult(generationId);
    const resultImg = await loadImageFromUrl(url);

    // Normalize the result to the exact square size, then crop per cell.
    const sized = newCanvas(px, px);
    sized.getContext('2d').drawImage(resultImg, 0, 0, px, px);
    const changed = model.applySquareResult(sized, square, fillCells, generationId, text);
    console.log('Applied result, updated cells:', changed, 'generationId:', generationId);
    return { changed, generationId };
  }

  async pollResult(generationId, { tries = 90, intervalMs = 2000 } = {}) {
    for (let i = 0; i < tries; i++) {
      await sleep(intervalMs);
      const resp = await fetch(`${LEO_V1}/generations/${generationId}`, { headers: this.authHeaders });
      if (!resp.ok) {
        if (resp.status === 429 || resp.status >= 500) continue; 
        throw new Error(await leoError(resp, 'checking the generation status'));
      }
      const polled = (await resp.json());
      const gen = polled?.generations_by_pk;
      const status = gen?.status;
      
      console.log(`Polling status: ${status}`, gen);

      if (status === 'COMPLETE') {
        const images = gen.generated_images || gen.generatedImages || [];
        recordGeneration({ generationId, polled, status });
        if (images.length > 0 && images[0]?.url) {
            return images[0].url;
        } else {
            console.error("Leonardo Complete, but empty image array:", gen);
            throw new Error('Leonardo marked job COMPLETE but returned 0 images. This is usually a silent safety filter block or a resolution rejection by Nano Banana 2.');
        }
      }
      if (status === 'FAILED') throw new Error('Leonardo reported the generation FAILED.');
    }
    throw new Error('Timed out waiting for Leonardo to finish the generation.');
  }
}

function extractGenerationId(json) {
  return json?.generate?.generationId
    || json?.generate?.generation_id
    || json?.sdGenerationJob?.generationId
    || json?.generationId
    || json?.generation_id
    || json?.id
    || json?.generations_by_pk?.id
    || (Array.isArray(json?.generations) ? json.generations[0]?.id : null)
    || null;
}

async function leoError(resp, action) {
  let detail = '';
  try {
    const body = await resp.json();
    detail = body?.error || body?.message || JSON.stringify(body);
  } catch (_) { }
  return `Leonardo API error ${resp.status} while ${action}: ${detail || resp.statusText}`;
}

function loadImageFromUrl(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous'; 
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Failed to load the generated image.'));
    img.src = url;
  });
}

/* --------------------------------------------------------------- main app */
class MapApp {
  constructor(model, config) {
    this.model = model;
    this.config = config; 
    this.generator = null;

    this.zoom = START_ZOOM;
    this.panX = 0;
    this.panY = 0;
    this.selection = new Set(); 
    this.refs = [];             
    this.busy = false;

    this.dragStart = null;
    this.dragging = false;
    this.previewRect = null;
    this.panning = false;
    this.panLast = null;

    this.stage = document.getElementById('stage');
    this.canvas = document.getElementById('canvas');
    this.ctx = this.canvas.getContext('2d');
    this.statusEl = document.getElementById('status');

    this._wireUI();
    this._resizeCanvas();

    /* Start zoomed out enough to see the tile grid as squares, anchored to the
       top-left corner of the map. */
    this.zoom = this.initialZoom();
    this.panX = 0;
    this.panY = 0;
    requestAnimationFrame(() => { this._resizeCanvas(); this.redraw(); });
  }

  initialZoom() {
    const cell = Math.max(this.model.cellW, this.model.cellH);
    const zoom = INITIAL_CELL_PX / cell;
    return Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom));
  }

  get dispW() { return Math.max(1, Math.round(this.model.cellW * this.zoom)); }
  get dispH() { return Math.max(1, Math.round(this.model.cellH * this.zoom)); }

  _wireUI() {
    document.getElementById('btn-generate').onclick = () => this.onGenerate();
    document.getElementById('btn-clear').onclick = () => this.clearSelection();
    document.getElementById('btn-erase').onclick = () => this.eraseSelection();
    document.getElementById('btn-upload').onclick = () => document.getElementById('file-ref').click();
    document.getElementById('btn-zoom-out').onclick = () => this.setZoom(this.zoom / 1.25);
    document.getElementById('btn-zoom-in').onclick = () => this.setZoom(this.zoom * 1.25);
    document.getElementById('btn-fit').onclick = () => this.fitZoom();
    document.getElementById('btn-export').onclick = () => this.exportPNG();
    document.getElementById('btn-save').onclick = () => this.saveMap();
    document.getElementById('btn-load').onclick = () => document.getElementById('file-load').click();
    document.getElementById('btn-settings').onclick = () => this.editSettings();

    document.getElementById('file-ref').onchange = (e) => this.onUpload(e.target.files);
    document.getElementById('file-load').onchange = (e) => this.onLoadFile(e.target.files[0]);

    window.addEventListener('resize', () => { this._resizeCanvas(); this.redraw(); });

    this.stage.addEventListener('mousedown', (e) => this.onPress(e));
    window.addEventListener('mousemove', (e) => this.onMove(e));
    window.addEventListener('mouseup', (e) => this.onRelease(e));
    this.stage.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      // A right-drag is a pan, not a menu request: swallow it once.
      if (this._rightDragMoved) { this._rightDragMoved = false; return; }
      const cell = this.eventToCell(e);
      if (cell) this.showCellContextMenu(cell);
    });
    this.stage.addEventListener('wheel', (e) => this.onWheel(e), { passive: false });
  }

  _resizeCanvas() {
    this.canvas.width = this.stage.clientWidth;
    this.canvas.height = this.stage.clientHeight;
  }

  eventToCell(e) {
    const rect = this.stage.getBoundingClientRect();
    const x = e.clientX - rect.left - this.panX;
    const y = e.clientY - rect.top - this.panY;
    const c = Math.floor(x / this.dispW);
    const r = Math.floor(y / this.dispH);
    return this.model.inBounds(c, r) ? [c, r] : null;
  }

  setZoom(zoom) {
    zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom));
    if (Math.abs(zoom - this.zoom) < 1e-6) return;
    const cx = this.canvas.width / 2, cy = this.canvas.height / 2;
    const wx = (cx - this.panX) / this.zoom;
    const wy = (cy - this.panY) / this.zoom;
    this.zoom = zoom;
    this.panX = cx - wx * this.zoom;
    this.panY = cy - wy * this.zoom;
    this.redraw();
  }

  fitZoom() {
    const zx = this.canvas.width / (this.model.cols * this.model.cellW);
    const zy = this.canvas.height / (this.model.rows * this.model.cellH);
    this.zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, Math.min(zx, zy)));
    this.panX = 0;
    this.panY = 0;
    this.redraw();
  }

  onWheel(e) {
    e.preventDefault();
    const rect = this.stage.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const wx = (mx - this.panX) / this.zoom;
    const wy = (my - this.panY) / this.zoom;
    const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
    this.zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, this.zoom * factor));
    this.panX = mx - wx * this.zoom;
    this.panY = my - wy * this.zoom;
    this.redraw();
  }

  onPress(e) {
    if (e.button === 1 || e.button === 2) {
      this.panning = true;
      this.panLast = [e.clientX, e.clientY];
      if (e.button === 2) { this._rightDownPos = [e.clientX, e.clientY]; this._rightDragMoved = false; }
      return;
    }
    if (e.button !== 0) return;
    this.dragStart = this.eventToCell(e);
    this.dragging = false;
  }

  onMove(e) {
    if (this.panning) {
      const [lx, ly] = this.panLast;
      this.panX += e.clientX - lx;
      this.panY += e.clientY - ly;
      this.panLast = [e.clientX, e.clientY];
      if (this._rightDownPos) {
        const dx = e.clientX - this._rightDownPos[0], dy = e.clientY - this._rightDownPos[1];
        if (dx * dx + dy * dy > 36) this._rightDragMoved = true;
      }
      this.redraw();
      return;
    }
    if (this.dragStart === null) return;
    const cell = this.eventToCell(e);
    if (!cell) return;
    this.dragging = true;
    this.previewRect = [this.dragStart, cell];
    this.redraw();
  }

  onRelease(e) {
    if (this.panning) { this.panning = false; this.panLast = null; this._rightDownPos = null; return; }
    if (this.dragStart === null) return;
    if (this.dragging && this.previewRect) {
      const [[c0, r0], [c1, r1]] = this.previewRect;
      for (let r = Math.min(r0, r1); r <= Math.max(r0, r1); r++) {
        for (let c = Math.min(c0, c1); c <= Math.max(c0, c1); c++) {
          this.selection.add(c + ',' + r);
        }
      }
    } else {
      const cell = this.eventToCell(e);
      if (cell) {
        const k = cell[0] + ',' + cell[1];
        if (this.selection.has(k)) this.selection.delete(k);
        else this.selection.add(k);
      }
    }
    this.dragStart = null;
    this.dragging = false;
    this.previewRect = null;
    this.redraw();
  }

  selectedCells() {
    return [...this.selection].map(k => k.split(',').map(Number));
  }

  clearSelection() { this.selection.clear(); this.redraw(); }

  eraseSelection() {
    if (!this.selection.size) return;
    const index = loadTileIndex();
    for (const [c, r] of this.selectedCells()) {
      this.model.clearTile(c, r);
      const k = c + ',' + r;
      delete index[k];
      ImageDB.delete(k).catch((err) => console.warn('Could not delete cached tile', k, err));
    }
    saveTileIndex(index);
    this.redraw();
  }

  async onUpload(files) {
    for (const file of files) {
      const data = await fileToBase64(file);
      const url = URL.createObjectURL(file);
      this.refs.push({ name: file.name, mimeType: file.type || 'image/png', data, url });
    }
    document.getElementById('file-ref').value = '';
    this._rebuildRefStrip();
  }

  _rebuildRefStrip() {
    const strip = document.getElementById('refstrip');
    strip.innerHTML = '';
    if (!this.refs.length) {
      const span = document.createElement('span');
      span.className = 'placeholder';
      span.textContent = "No reference images. Use 'Upload reference'.";
      strip.appendChild(span);
      return;
    }
    this.refs.forEach((ref, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'ref';
      const img = document.createElement('img');
      img.src = ref.url;
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = ref.name;
      const rm = document.createElement('button');
      rm.textContent = 'remove';
      rm.onclick = () => { this.refs.splice(i, 1); this._rebuildRefStrip(); };
      wrap.append(img, name, rm);
      strip.appendChild(wrap);
    });
  }

  /* Right-click on a tile: offer to browse its generation history or undo the
     most recent generation. */
  async showCellContextMenu([c, r]) {
    if (this.busy) return;
    const hist = this.model.getHistory(c, r);
    if (!hist.length) {
      Swal.fire({ icon: 'info', title: `Tile ${c},${r}`,
        text: 'No generation history for this tile yet.' });
      return;
    }
    const res = await Swal.fire({
      title: `Tile ${c},${r}`,
      text: `${hist.length} generation(s) saved. The first is the active one.`,
      showCancelButton: true,
      showDenyButton: true,
      confirmButtonText: 'Show history',
      denyButtonText: 'Undo last generation',
      cancelButtonText: 'Close',
    });
    if (res.isConfirmed) await this.showHistory([c, r]);
    else if (res.isDenied) await this.undoLast([c, r]);
  }

  /* Remove the active (most recent) result for a cell, reverting to the
     previous one (or clearing the tile if it was the only result). */
  async undoLast([c, r]) {
    const remaining = this.model.removeHistoryIndex(c, r, 0);
    if (remaining > 0) await this.model.refreshActive(c, r);
    await this.persistCellHistory(c, r);
    this.redraw();
    this.setStatus(remaining > 0
      ? `Reverted tile ${c},${r} to the previous generation.`
      : `Removed the only generation for tile ${c},${r}.`);
  }

  /* Interactive history browser: step through a cell's saved results, switch
     which one is active, or delete individual results. */
  async showHistory([c, r]) {
    const model = this.model;
    const self = this;
    let idx = 0;
    const fmt = (e) => {
      const id = e.id ? `id ${String(e.id).slice(0, 8)}` : '(no id)';
      const when = e.savedAt ? ` \u00b7 ${new Date(e.savedAt).toLocaleString()}` : '';
      return id + when;
    };
    await Swal.fire({
      title: `Tile ${c},${r} history`,
      width: 540,
      showConfirmButton: false,
      showCloseButton: true,
      html: `
        <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
          <img id="h-img" alt="result preview"
            style="width:256px;height:256px;object-fit:cover;border:1px solid #444;border-radius:4px;background:#000" />
          <div id="h-meta" style="font-size:12px;color:#666"></div>
          <div id="h-prompt"
            style="font-size:12px;color:#444;max-height:60px;overflow:auto;text-align:left;width:100%;white-space:pre-wrap"></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
            <button id="h-prev" class="swal2-styled" style="background:#555">&larr; Prev</button>
            <button id="h-next" class="swal2-styled" style="background:#555">Next &rarr;</button>
            <button id="h-use" class="swal2-styled" style="background:#39c0ff;color:#000">Use this</button>
            <button id="h-del" class="swal2-styled" style="background:#c0392b">Delete this</button>
          </div>
        </div>`,
      didOpen: () => {
        const imgEl = document.getElementById('h-img');
        const metaEl = document.getElementById('h-meta');
        const promptEl = document.getElementById('h-prompt');
        const useBtn = document.getElementById('h-use');
        const render = () => {
          const hist = model.getHistory(c, r);
          if (!hist.length) { Swal.close(); return; }
          if (idx >= hist.length) idx = hist.length - 1;
          if (idx < 0) idx = 0;
          const e = hist[idx];
          imgEl.src = e.dataUrl;
          metaEl.textContent = `${idx + 1} / ${hist.length}${idx === 0 ? ' (active)' : ''} \u2014 ${fmt(e)}`;
          promptEl.textContent = e.prompt || '';
          useBtn.disabled = idx === 0;
        };
        document.getElementById('h-prev').onclick = () => { idx = Math.max(0, idx - 1); render(); };
        document.getElementById('h-next').onclick = () => {
          idx = Math.min(model.getHistory(c, r).length - 1, idx + 1); render();
        };
        useBtn.onclick = async () => {
          await model.setActiveIndex(c, r, idx);
          await self.persistCellHistory(c, r);
          idx = 0;
          self.redraw();
          render();
          self.setStatus(`Switched tile ${c},${r} to a different saved generation.`);
        };
        document.getElementById('h-del').onclick = async () => {
          const remaining = model.removeHistoryIndex(c, r, idx);
          if (remaining > 0) await model.refreshActive(c, r);
          await self.persistCellHistory(c, r);
          self.redraw();
          if (!remaining) { Swal.close(); } else { idx = 0; render(); }
        };
        render();
      },
    });
  }

  async onGenerate() {
    if (this.busy) return;
    const selected = this.selectedCells();
    const check = validateSelection(selected);
    if (!check.ok) {
      console.warn('Selection rejected:', check, selected);
      Swal.fire({ icon: 'info', title: 'Adjust selection', text: check.reason });
      return;
    }
    const partial = selected.some(([c, r]) => !this.model.isEmpty(c, r));
    const verb = partial ? 'Inpaint' : 'Outpaint';

    const { value: prompt } = await Swal.fire({
      title: `${verb} ${selected.length} tile(s)`,
      input: 'textarea',
      inputLabel: 'Describe what should appear in the selected area:',
      inputPlaceholder: 'e.g. a coastline with a small fishing village',
      showCancelButton: true,
      confirmButtonText: 'Generate',
    });
    if (!prompt) return;

    this.busy = true;
    this.setStatus(`${verb}ing ${selected.length} tile(s)\u2026 contacting Leonardo\u2026`);
    Swal.fire({ title: `${verb}ing\u2026`, text: 'Uploading and generating with Leonardo.',
      allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    try {
      if (!this.generator) {
        this.generator = new LeonardoGenerator(this.config.apiKey, this.config.modelName);
      }
      const { changed, generationId } =
        await this.generator.generateRegion(this.model, selected, prompt, this.refs);
      await this.persistCells(changed);
      Swal.close();
      this.redraw();
      this.setStatus(`Done. Updated ${changed.length} tile(s). generationId ${generationId}.`);
    } catch (err) {
      Swal.close();
      console.error('Generation failed:', err);
      Swal.fire({ icon: 'error', title: 'Generation failed', text: String(err.message || err) });
      this.setStatus('Generation failed.');
    } finally {
      this.busy = false;
    }
  }

  /* Save each freshly produced cell's full history (IndexedDB) and its
     x,y -> active id map (localStorage) so a reload re-renders it without
     re-downloading. */
  async persistCells(cells) {
    for (const [c, r] of cells) await this.persistCellHistory(c, r);
    console.log('Persisted cells to IndexedDB + tile index:', cells);
  }

  /* Write (or remove) a single cell's generation history to the caches. */
  async persistCellHistory(c, r) {
    const k = c + ',' + r;
    const hist = this.model.getHistory(c, r);
    const index = loadTileIndex();
    if (!hist.length) {
      delete index[k];
      try { await ImageDB.delete(k); } catch (err) { console.warn('Could not delete cached tile', k, err); }
    } else {
      try {
        await ImageDB.put(k, {
          history: hist.map(e => ({ id: e.id, prompt: e.prompt, savedAt: e.savedAt, dataUrl: e.dataUrl })),
          c, r,
        });
        index[k] = { c, r, id: hist[0].id || null };
      } catch (err) {
        console.warn('Could not cache tile', k, err);
      }
    }
    saveTileIndex(index);
  }

  exportPNG() {
    const longEdge = Math.max(this.model.cols * this.model.cellW, this.model.rows * this.model.cellH);
    const scale = Math.min(1.0, 8192 / longEdge);
    const canvas = this.model.renderFull(scale);
    downloadDataUrl(canvas.toDataURL('image/png'), 'map.png');
    this.setStatus('Exported map as PNG.');
  }

  saveMap() {
    const blob = new Blob([JSON.stringify(this.model.toJSON())], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    downloadDataUrl(url, 'map.json');
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    this.setStatus('Saved map as JSON.');
  }

  async onLoadFile(file) {
    if (!file) return;
    try {
      const meta = JSON.parse(await file.text());
      this.model = await MapModel.fromJSON(meta);
      this.selection.clear();
      this.fitZoom();
      this.setStatus('Loaded map.');
    } catch (err) {
      Swal.fire({ icon: 'error', title: 'Load failed', text: String(err.message || err) });
    }
    document.getElementById('file-load').value = '';
  }

  async editSettings() {
    const cfg = await askApiSettings(this.config);
    if (cfg) {
      this.config = cfg;
      saveConfig(cfg);
      this.generator = null; 
      this.setStatus('Updated API settings.');
    }
  }

  redraw() {
    const ctx = this.ctx;
    const W = this.canvas.width, H = this.canvas.height;
    const dw = this.dispW, dh = this.dispH;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#101010';
    ctx.fillRect(0, 0, W, H);

    if (W === 0 || H === 0) {
      // Layout not ready yet: try again on the next frame instead of drawing
      // nothing (this was a cause of the grid silently never appearing). Cap
      // the retries so we never spin forever if the stage stays collapsed.
      this._zeroSizeRetries = (this._zeroSizeRetries || 0) + 1;
      if (this._zeroSizeRetries <= 30) {
        console.warn('Canvas has zero size; deferring redraw.', this._zeroSizeRetries);
        requestAnimationFrame(() => { this._resizeCanvas(); this.redraw(); });
      } else {
        console.error('Canvas still has zero size after retries; giving up.');
      }
      return;
    }
    this._zeroSizeRetries = 0;

    const c0 = Math.max(0, Math.floor((-this.panX) / dw));
    const r0 = Math.max(0, Math.floor((-this.panY) / dh));
    const c1 = Math.min(this.model.cols - 1, Math.floor((W - this.panX) / dw));
    const r1 = Math.min(this.model.rows - 1, Math.floor((H - this.panY) / dh));

    for (let r = r0; r <= r1; r++) {
      for (let c = c0; c <= c1; c++) {
        const x = this.panX + c * dw, y = this.panY + r * dh;
        const tile = this.model.getTile(c, r);
        if (tile) {
          ctx.drawImage(tile, x, y, dw, dh);
        } else {
          // Checkerboard so empty cells (and therefore the grid) are always
          // visible, even on a brand-new all-black map.
          ctx.fillStyle = ((c + r) & 1) ? EMPTY_CELL_ALT : EMPTY_CELL;
          ctx.fillRect(x, y, dw, dh);
        }
      }
    }

    // Grid lines. Always draw something: at fine zoom draw every cell border;
    // once cells get small, thin the lines out (every Nth) so a grid is still
    // visible instead of vanishing entirely. step==1 while cells are >=6px wide;
    // below that we draw a line roughly every 8px of screen space.
    const step = dw >= 6 ? 1 : Math.ceil(8 / dw);
    ctx.strokeStyle = step === 1 ? GRID_COLOR : GRID_COLOR_MAJOR;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let c = c0 - (c0 % step); c <= c1 + 1; c += step) {
      const x = Math.round(this.panX + c * dw) + 0.5;
      ctx.moveTo(x, this.panY + r0 * dh);
      ctx.lineTo(x, this.panY + (r1 + 1) * dh);
    }
    for (let r = r0 - (r0 % step); r <= r1 + 1; r += step) {
      const y = Math.round(this.panY + r * dh) + 0.5;
      ctx.moveTo(this.panX + c0 * dw, y);
      ctx.lineTo(this.panX + (c1 + 1) * dw, y);
    }
    ctx.stroke();

    // Paint each generated cell with the short form of its generation id, so
    // the user can see which id produced which square.
    if (dw >= 40 && dh >= 16) {
      ctx.font = `${Math.max(8, Math.min(14, Math.floor(dh / 6)))}px monospace`;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.textBaseline = 'top';
      for (let r = r0; r <= r1; r++) {
        for (let c = c0; c <= c1; c++) {
          const id = this.model.getId(c, r);
          if (!id) continue;
          ctx.fillText(String(id).slice(0, 8), this.panX + c * dw + 3, this.panY + r * dh + 3);
        }
      }
    }

    ctx.fillStyle = SELECT_FILL;
    ctx.strokeStyle = SELECT_OUTLINE;
    ctx.lineWidth = 2;
    for (let r = r0; r <= r1; r++) {
      for (let c = c0; c <= c1; c++) {
        if (!this.selection.has(c + ',' + r)) continue;
        const x = this.panX + c * dw, y = this.panY + r * dh;
        ctx.fillRect(x, y, dw, dh);
        ctx.strokeRect(x + 1, y + 1, Math.max(1, dw - 2), Math.max(1, dh - 2));
      }
    }

    if (this.previewRect) {
      const [[pc0, pr0], [pc1, pr1]] = this.previewRect;
      const x = this.panX + Math.min(pc0, pc1) * dw;
      const y = this.panY + Math.min(pr0, pr1) * dh;
      const w = (Math.abs(pc1 - pc0) + 1) * dw;
      const h = (Math.abs(pr1 - pr0) + 1) * dh;
      ctx.strokeStyle = SELECT_OUTLINE;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 2]);
      ctx.strokeRect(x, y, w, h);
      ctx.setLineDash([]);
    }

    this._updateStatus();
  }

  setStatus(text) { this.statusEl.textContent = text; }

  _updateStatus() {
    if (this.busy) return;
    this.setStatus(
      `Map ${this.model.cols}x${this.model.rows} tiles | ` +
      `cell ${this.model.cellW}x${this.model.cellH}px | ` +
      `zoom ${(this.zoom * 100).toFixed(0)}% | selected: ${this.selection.size}`);
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function downloadDataUrl(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function askApiSettings(existing = {}) {
  const model = existing.modelName || DEFAULT_MODEL;
  const { value } = await Swal.fire({
    title: 'API settings',
    html: `
      <div class="swal-field">
        <label for="sw-provider">Provider</label>
        <select id="sw-provider" class="swal2-select" style="margin:0;width:100%">
          <option value="leonardo" selected>Leonardo AI</option>
        </select>
      </div>
      <div class="swal-field">
        <label for="sw-model">Model</label>
        <select id="sw-model" class="swal2-select" style="margin:0;width:100%">
          <option value="nano-banana-2"${model === 'nano-banana-2' ? ' selected' : ''}>Nano Banana 2</option>
        </select>
      </div>
      <div class="swal-field">
        <label for="sw-key">API key</label>
        <input id="sw-key" type="password" class="swal2-input" style="margin:0;width:100%"
          placeholder="Leonardo API key" value="${existing.apiKey || ''}" />
      </div>`,
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: 'Save',
    preConfirm: () => {
      const apiKey = document.getElementById('sw-key').value.trim();
      const modelName = document.getElementById('sw-model').value.trim() || DEFAULT_MODEL;
      const provider = document.getElementById('sw-provider').value;
      if (!apiKey) { Swal.showValidationMessage('An API key is required.'); return false; }
      return { provider, apiKey, modelName };
    },
  });
  return value || null;
}

async function askNewMap() {
  const { value } = await Swal.fire({
    title: 'New map',
    html: `
      <div class="swal-field">
        <label>Matrix size (number of tiles)</label>
        <div class="swal-row">
          <div class="swal-field">
            <label for="sw-cols">Columns</label>
            <input id="sw-cols" class="swal2-input" style="margin:0;width:100%" value="100" />
          </div>
          <div class="swal-field">
            <label for="sw-rows">Rows</label>
            <input id="sw-rows" class="swal2-input" style="margin:0;width:100%" value="100" />
          </div>
        </div>
      </div>
      <div class="swal-field">
        <label>Cell size (pixels, rounded to x16)</label>
        <div class="swal-row">
          <div class="swal-field">
            <label for="sw-cw">Width</label>
            <input id="sw-cw" class="swal2-input" style="margin:0;width:100%" value="1024" />
          </div>
          <div class="swal-field">
            <label for="sw-ch">Height</label>
            <input id="sw-ch" class="swal2-input" style="margin:0;width:100%" value="1024" />
          </div>
        </div>
      </div>`,
    focusConfirm: false,
    allowOutsideClick: false,
    confirmButtonText: 'Create',
    preConfirm: () => {
      const cols = parseInt(document.getElementById('sw-cols').value, 10);
      const rows = parseInt(document.getElementById('sw-rows').value, 10);
      const cw = parseFloat(document.getElementById('sw-cw').value);
      const ch = parseFloat(document.getElementById('sw-ch').value);
      if ([cols, rows, cw, ch].some(v => !Number.isFinite(v))) {
        Swal.showValidationMessage('Please enter whole numbers.');
        return false;
      }
      if (cols < 1 || rows < 1) {
        Swal.showValidationMessage('Matrix size must be at least 1x1.');
        return false;
      }
      return { cols, rows, cw: roundTo(cw), ch: roundTo(ch) };
    },
  });
  return value || null;
}

/* Repopulate a fresh model from previously cached tiles (IndexedDB images +
   localStorage x,y->id index) so a reload shows prior work without re-billing
   the API. */
async function restorePersistedTiles(model) {
  const index = loadTileIndex();
  const entries = Object.values(index);
  if (!entries.length) return 0;
  let restored = 0;
  await Promise.all(entries.map(async ({ c, r, id }) => {
    if (!model.inBounds(c, r)) return;
    try {
      const rec = await ImageDB.get(c + ',' + r);
      if (!rec) return;
      // New format stores a history array; old format stored a single dataUrl.
      const histMeta = (rec.history && rec.history.length)
        ? rec.history
        : (rec.dataUrl ? [{ id: rec.id || id || null, prompt: '', savedAt: null, dataUrl: rec.dataUrl }] : null);
      if (!histMeta) return;
      const active = histMeta[0];
      await new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const tile = newCanvas(model.cellW, model.cellH);
          tile.getContext('2d').drawImage(img, 0, 0, model.cellW, model.cellH);
          model.setTile(c, r, tile, active.id || id || null);
          const list = histMeta.map((e, i) => ({
            id: e.id || null, prompt: e.prompt || '', savedAt: e.savedAt || null,
            dataUrl: e.dataUrl, canvas: i === 0 ? tile : null,
          }));
          model.history.set(model.key(c, r), list);
          restored++;
          resolve();
        };
        img.onerror = () => resolve();
        img.src = active.dataUrl;
      });
    } catch (err) {
      console.warn('Could not restore tile', c, r, err);
    }
  }));
  console.log('Restored persisted tiles:', restored);
  return restored;
}

(async function main() {
  const config = await askApiSettings(loadConfig());
  if (!config) { document.getElementById('status').textContent = 'Cancelled.'; return; }
  saveConfig(config);

  const dims = await askNewMap();
  if (!dims) { document.getElementById('status').textContent = 'Cancelled.'; return; }

  const model = new MapModel(dims.cols, dims.rows, dims.cw, dims.ch);
  try {
    await restorePersistedTiles(model);
  } catch (err) {
    console.warn('Tile restore failed:', err);
  }
  const app = new MapApp(model, config);
  window.__mapApp = app; 
  console.log('Map app ready:', { cols: model.cols, rows: model.rows, cellW: model.cellW, cellH: model.cellH });
})();
</script>
